name: Tests

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]

jobs:
  test:
    runs-on: ubuntu-latest
    strategy:
      matrix:
        python-version: ["3.13"]

    steps:
    - uses: actions/checkout@v4
      with:
        fetch-depth: 0  # Fetch full history for proper git testing

    - name: Set up Python ${{ matrix.python-version }}
      uses: actions/setup-python@v4
      with:
        python-version: ${{ matrix.python-version }}

    - name: Install uv
      uses: astral-sh/setup-uv@v3
      with:
        version: "latest"

    - name: Install dependencies
      run: |
        uv sync --extra test

    - name: Configure git for testing
      run: |
        git config --global user.name "GitHub Actions"
        git config --global user.email "actions@github.com"
        git config --global init.defaultBranch main

    - name: Run pytest
      run: |
        uv run pytest -v --tb=short

    - name: Install GitHub CLI (for PR creation tests)
      run: |
        curl -fsSL https://cli.github.com/packages/githubcli-archive-keyring.gpg | sudo dd of=/usr/share/keyrings/githubcli-archive-keyring.gpg
        echo "deb [arch=$(dpkg --print-architecture) signed-by=/usr/share/keyrings/githubcli-archive-keyring.gpg] https://cli.github.com/packages stable main" | sudo tee /etc/apt/sources.list.d/github-cli.list > /dev/null
        sudo apt update
        sudo apt install gh

    - name: Cache mutation testing
      uses: actions/cache@v4
      with:
        path: .mutmut-cache
        key: mutmut-${{ hashFiles('main.py', 'vibe_status_only.py', 'test_*.py', 'pyproject.toml') }}
        restore-keys: |
          mutmut-

    - name: Run mutation testing on main.py
      run: |
        # Update pyproject.toml to test main.py
        cp pyproject.toml pyproject.toml.bak
        sed -i 's/paths_to_mutate = \["vibe_status_only.py"\]/paths_to_mutate = ["main.py"]/' pyproject.toml
        
        # Run mutmut
        uv run mutmut run || true
        echo "## Mutation Testing Results for main.py" >> $GITHUB_STEP_SUMMARY
        echo '```' >> $GITHUB_STEP_SUMMARY
        uv run mutmut results --all true >> $GITHUB_STEP_SUMMARY || echo "No results to show" >> $GITHUB_STEP_SUMMARY
        echo '```' >> $GITHUB_STEP_SUMMARY
        
        # Restore original pyproject.toml
        mv pyproject.toml.bak pyproject.toml
      continue-on-error: true  # Don't fail the build if mutation score is low

    # Cache is preserved between runs for speed

    - name: Run focused mutation testing on vibe_status_only.py
      run: |
        # Use the default config from pyproject.toml which tests vibe_status_only.py
        uv run mutmut run || true
        echo "## Mutation Testing Results for vibe_status_only.py" >> $GITHUB_STEP_SUMMARY
        echo '```' >> $GITHUB_STEP_SUMMARY
        uv run mutmut results --all true >> $GITHUB_STEP_SUMMARY || echo "No results to show" >> $GITHUB_STEP_SUMMARY
        echo '```' >> $GITHUB_STEP_SUMMARY
      continue-on-error: true

  lint:
    runs-on: ubuntu-latest
    
    steps:
    - uses: actions/checkout@v4
    
    - name: Set up Python
      uses: actions/setup-python@v4
      with:
        python-version: "3.13"

    - name: Install uv
      uses: astral-sh/setup-uv@v3
      with:
        version: "latest"

    - name: Install dependencies
      run: |
        uv sync --extra dev

    - name: Check code formatting with ruff
      run: |
        uv run ruff format --check .

    - name: Lint with ruff
      run: |
        uv run ruff check .

    - name: Check Python syntax
      run: |
        uv run python -m py_compile main.py vibe_status_only.py test_status_only.py